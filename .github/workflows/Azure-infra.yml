name: Azure Infrastructure – Bicep Lint & Validate

on:
  push:
    branches: [ "Azure" ]
    paths:
      - 'infra/**'
      - '.github/workflows/Azure-infra.yml'
  pull_request:
    branches: [ "Azure-main" ]
    paths:
      - 'infra/**'
      - '.github/workflows/Azure-infra.yml'

jobs:
  lint-and-validate:
    name: Bicep Lint & What-If
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC login to Azure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          az bicep install
          az bicep version

      - name: Lint main.bicep
        run: az bicep lint --file infra/main.bicep

      - name: Lint all modules
        run: |
          for f in infra/modules/*.bicep; do
            echo "Linting $f"
            az bicep lint --file "$f"
          done

      # The what-if / validate steps require Azure credentials.
      # They are skipped unless AZURE_CLIENT_ID and AZURE_SUBSCRIPTION_ID are set.
      - name: Azure Login (OIDC)
        if: >
          vars.AZURE_CLIENT_ID != '' &&
          vars.AZURE_SUBSCRIPTION_ID != '' &&
          vars.AZURE_TENANT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Validate deployment (what-if)
        if: >
          vars.AZURE_CLIENT_ID != '' &&
          vars.AZURE_SUBSCRIPTION_ID != '' &&
          vars.AZURE_TENANT_ID != '' &&
          vars.AZURE_RESOURCE_GROUP != ''
        run: |
          az deployment group what-if \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --parameters saPassword="${{ secrets.SA_PASSWORD }}" \
                         rabbitMqPass="${{ secrets.RABBITMQ_PASS }}" \
            --no-pretty-print
